openapi: 3.0.3
info:
  title: PIIP API
  version: 0.2.0
  description: >-
    Snapshot incremental codigo-first. Las operaciones se agregan solo cuando sus controladores,
    DTO y pruebas de contrato estan implementados y validados.
servers:
  - url: /api/v1
paths:
  /portafolio/iniciativas:
    post:
      tags:
        - Portafolio - Iniciativas
      summary: Presentar iniciativa
      description: >-
        Registra una iniciativa nueva. El servidor genera el codigo, fija el estado PRESENTADO
        y devuelve 201 con ETag. La operacion exige Idempotency-Key para reintentos seguros;
        misma clave y mismo payload devuelven el resultado original, mientras que una clave
        con payload distinto produce 409 Conflict.
      operationId: presentarIniciativa
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInitiativeRequest"
      responses:
        "201":
          description: Iniciativa presentada con codigo generado.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiativeDetail"
        "400":
          description: Solicitud malformada o falta Idempotency-Key o X-Asignacion-Efectiva-Id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: Idempotency-Key reutilizada con payload distinto.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Regla de negocio incumplida.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/incorporaciones:
    post:
      tags:
        - Portafolio - Incorporacion
      summary: Registrar incorporacion individual
      description: >-
        Registra una incorporacion individual de informacion existente y la fija en estado
        PENDIENTE. Devuelve 201 con ETag. La deduplicacion por hash y responsable es
        primaria. Si el cliente envia Idempotency-Key y el servicio de idempotencia esta
        disponible, misma clave y mismo payload retornan el resultado original; payload
        distinto produce 409 Conflict. Cualquier conflicto CODIGO o DUPLICADO detectado
        se abre como INCORPORACION_CONFLICTO_UNRESOLVED y bloquea la validacion hasta su
        resolucion por el Evaluador.
      operationId: registrarIncorporacion
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateIncorporacionRequest"
      responses:
        "201":
          description: Incorporacion registrada en estado PENDIENTE.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncorporacionDetail"
        "400":
          description: Solicitud malformada o falta X-Asignacion-Efectiva-Id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: DUPLICATE_INCORPORATION_HASH o Idempotency-Key con payload distinto.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Regla de negocio incumplida.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/incorporaciones/{id}/correcciones:
    post:
      tags:
        - Portafolio - Incorporacion
      summary: Corregir incorporacion pendiente
      description: >-
        Registra una correccion append-only. Solo permitido mientras la incorporacion siga en
        estado PENDIENTE. La cabecera If-Match permite control de concurrencia optimista.
        Cada correccion crea una nueva entrada en INCORPORACION_CAMBIO con datos antes,
        datos despues y motivo. La historia no se destruye.
      operationId: corregirIncorporacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncorporacionCorreccionRequest"
      responses:
        "200":
          description: Correccion registrada.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncorporacionDetail"
        "400":
          description: Solicitud malformada o falta X-Asignacion-Efectiva-Id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: CORRECTION_NOT_OPEN o If-Match no coincide.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: Regla de negocio incumplida.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/incorporaciones/{id}/validaciones:
    post:
      tags:
        - Portafolio - Incorporacion
      summary: Validar o rechazar incorporacion
      description: >-
        El Evaluador transiciona la incorporacion a VALIDADO o RECHAZADO segun el estado
        canonico de la iniciativa. La operacion se bloquea si existen conflictos sin
        resolver (INCORPORATION_CONFLICT_UNRESOLVED). La vinculacion de duplicado registra
        el id del registro original sin mutarlo.
      operationId: validarIncorporacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncorporacionValidacionRequest"
      responses:
        "200":
          description: Incorporacion transicionada.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncorporacionDetail"
        "400":
          description: Solicitud malformada o falta X-Asignacion-Efectiva-Id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: INCORPORATION_CONFLICT_UNRESOLVED o INCORPORATION_NOT_PENDING.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/incorporaciones/{id}/conflictos/{conflictoId}/resoluciones:
    post:
      tags:
        - Portafolio - Incorporacion
      summary: Resolver conflicto de incorporacion
      description: >-
        El Evaluador documenta la resolucion de un conflicto abierto. La operacion registra
        la fecha, el resolutor y el documento de soporte si lo hubiera. Conflicto ya resuelto
        produce 409 CONFLICT_ALREADY_RESOLVED.
      operationId: resolverConflictoIncorporacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: conflictoId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IncorporacionResolucionConflictoRequest"
      responses:
        "200":
          description: Conflicto resuelto.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IncorporacionDetail"
        "404":
          description: CONFLICT_NOT_FOUND o INCORPORATION_NOT_FOUND.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: CONFLICT_ALREADY_RESOLVED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []
  /portafolio/iniciativas/{id}/subsanaciones:
    post:
      tags:
        - Portafolio - Evaluacion
      summary: Abrir subsanacion unica de iniciativa
      description: >-
        El Evaluador abre la unica subsanacion de la iniciativa. La iniciativa debe
        seguir en estado PRESENTADO. El plazo debe ser estrictamente posterior a la
        fecha de apertura (invariante determinista CK_SI_PLAZO del incremento 014.1).
        Una segunda apertura concurrente o explicita produce 409 CORRECTION_ALREADY_USED.
      operationId: abrirSubsanacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenCorrectionRequest"
      responses:
        "201":
          description: Subsanacion abierta.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsanacionDetail"
        "409":
          description: CORRECTION_ALREADY_USED o estado invalido.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: SUBSANATION_PLAZO_INVALID.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/iniciativas/{id}/subsanacion:
    patch:
      tags:
        - Portafolio - Evaluacion
      summary: Corregir subsanacion abierta
      description: >-
        El Responsable titular corrige los campos oficiales 5-12, 22 y 23 mientras
        la subsanacion este abierta y dentro de plazo. La cabecera If-Match es
        obligatoria para control de concurrencia optimista. La persistencia es
        append-only: la fila de SUBSANACION_INICIATIVA nunca se elimina.
      operationId: editarSubsanacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubsanacionEditCommand"
      responses:
        "200":
          description: Correccion registrada.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsanacionDetail"
        "409":
          description: CORRECTION_NOT_OPEN o estado invalido.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "412":
          description: STATE_CHANGED por ETag obsoleto.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/iniciativas/{id}/subsanacion/cierre:
    post:
      tags:
        - Portafolio - Evaluacion
      summary: Cerrar subsanacion
      description: >-
        Registra la fecha de atencion de la subsanacion. La fila permanece para
        auditoria (no se elimina). El Responsable o el Evaluador cierran; la
        cabecera If-Match controla la concurrencia.
      operationId: cerrarSubsanacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Subsanacion cerrada.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubsanacionDetail"
        "409":
          description: CORRECTION_NOT_OPEN.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "412":
          description: STATE_CHANGED por ETag obsoleto.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/iniciativas/{id}/evaluaciones/admisibilidad:
    post:
      tags:
        - Portafolio - Evaluacion
      summary: Registrar admisibilidad
      description: >-
        El Evaluador registra la decision de admision. El documento de Opinion
        Tecnica de Evaluacion (campo 14) es obligatorio. La iniciativa transita
        a NO_ADMISIBLE solo si la subsanacion unica esta vencida o nunca se
        abrio. La Autoridad y el Responsable no pueden evaluar.
      operationId: registrarAdmisibilidad
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdmissibilityRequest"
      responses:
        "200":
          description: Admision registrada.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluacionDetail"
        "403":
          description: ASSIGNMENT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: ADMISSIBILITY_ALREADY_RECORDED o estado invalido.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: ADMISSIBILITY_INCOMPLETE o EVIDENCE_NOT_ELIGIBLE.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/iniciativas/{id}/evaluaciones/aplicabilidad:
    post:
      tags:
        - Portafolio - Evaluacion
      summary: Registrar aplicabilidad
      description: >-
        El Evaluador registra la decision de aplicabilidad. El motivo es
        obligatorio cuando el resultado es NO_APLICABLE. La lista estructurada
        de competencia, valor publico y caracter innovator se persiste como
        criterios. La Autoridad y el Responsable no pueden evaluar.
      operationId: registrarAplicabilidad
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicabilityRequest"
      responses:
        "200":
          description: Aplicabilidad registrada.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluacionDetail"
        "403":
          description: ASSIGNMENT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: APPLICABILITY_ALREADY_RECORDED o estado invalido.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: APPLICABILITY_INCOMPLETE.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/transiciones/{id}:
    post:
      tags:
        - Portafolio - Transiciones
      summary: Confirmar transicion de estado de iniciativa
      description: >-
        Confirma una transicion controlada de la maquina de estados canonica del
        portafolio (US2). La cabecera If-Match es obligatoria y exige la version
        actual del registro; sin ella se responde 428 PRECONDITION_REQUIRED;
        con un ETag que no coincide se responde 412 STATE_CHANGED. La
        transicion se ejecuta bajo bloqueo pesimista (PESSIMISTIC_WRITE) sobre
        la fila de PROYECTO para resolver la carrera entre confirmaciones
        concurrentes; la primera gana y el resto recibe 412. La evidencia
        documental es obligatoria en todos los destinos canonicos. La
        auditoria de exito se emite en la misma transaccion de negocio; la de
        denegacion, en REQUIRES_NEW. Los estados terminales (NO_ADMISIBLE,
        NO_APLICABLE, INICIATIVA_ARCHIVADA) no admiten transiciones
        adicionales.
      operationId: transicionarIniciativa
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKeyOptional"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransicionCommand"
      responses:
        "200":
          description: Transicion confirmada.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransicionDetail"
        "400":
          description: Solicitud malformada o falta Idempotency-Key o X-Asignacion-Efectiva-Id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: ASSIGNMENT_SCOPE_DENIED o FORBIDDEN_PROFILE.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: STATE_TRANSITION_NOT_ALLOWED o estado terminal.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "412":
          description: STATE_CHANGED por ETag obsoleto.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: FORMAL_DECISION_REQUIRED, EVIDENCE_NOT_ELIGIBLE u observacion obligatoria ausente.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "428":
          description: IF_MATCH_REQUIRED por cabecera ausente.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []


  /portafolio/iniciativas/{id}/proyecto-derivado:
    post:
      tags:
        - Portafolio - Proyectos
      summary: Crear proyecto derivado de iniciativa aprobada
      description: >-
        El Responsable autorizado crea el unico proyecto derivado de una iniciativa
        INICIATIVA_APROBADA. El servidor copia el codigo de origen y el tipo de
        solucion, genera el codigo propio bajo PESSIMISTIC_WRITE y fija el estado
        PROYECTO_EJECUCION. El vinculo iniciativa-proyecto es inmutable. La cabecera
        Idempotency-Key es obligatoria. Un segundo intento de derivado para la misma
        iniciativa falla con 409 DERIVATION_ALREADY_EXISTS; dos solicitudes concurrentes
        son serializadas por bloqueo pesimista y la primera confirmacion gana.
      operationId: crearProyectoDerivado
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDerivedProjectRequest"
      responses:
        "201":
          description: Proyecto derivado creado.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "400":
          description: Solicitud malformada o falta Idempotency-Key o X-Asignacion-Efectiva-Id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: ASSIGNMENT_SCOPE_DENIED o FORBIDDEN_PROFILE.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: DERIVATION_ALREADY_EXISTS o INITIATIVE_NOT_APPROVED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: FORMAL_DOCUMENT_REQUIRED, UNIT_MAIN_CARDINALITY u OFFICIAL_FIELD_REQUIRED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/proyectos-directos:
    post:
      tags:
        - Portafolio - Proyectos
      summary: Crear proyecto directo heredado o excepcional
      description: >-
        La Autoridad o el Evaluador con documento formal registra un proyecto directo
        heredado o excepcional sin iniciativa origen. El servidor fija el estado
        PROYECTO_EJECUCION, exige codigo propio y se asegura de que solo exista un
        proyecto directo activo por unidad ejecutora y anio. La cabecera
        Idempotency-Key es obligatoria. Un segundo directo concurrente para la misma
        unidad y anio falla con 409 DIRECT_PROJECT_NOT_AUTHORIZED. El Responsable
        queda excluido por constitucion y recibe 403 ASSIGNMENT_SCOPE_DENIED. Esta
        ruta NO omite la evaluacion de una iniciativa nueva.
      operationId: crearProyectoDirecto
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectProjectRequest"
      responses:
        "201":
          description: Proyecto directo creado.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDetail"
        "400":
          description: Solicitud malformada o falta Idempotency-Key o X-Asignacion-Efectiva-Id.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: ASSIGNMENT_SCOPE_DENIED o FORBIDDEN_PROFILE.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: DIRECT_PROJECT_NOT_AUTHORIZED o DIRECT_PROJECT_DUPLICATE.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: FORMAL_DOCUMENT_REQUIRED, EVIDENCE_NOT_ELIGIBLE u OFFICIAL_FIELD_REQUIRED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

