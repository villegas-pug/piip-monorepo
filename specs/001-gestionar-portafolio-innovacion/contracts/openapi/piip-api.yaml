        "428":
          description: IF_MATCH_REQUIRED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []

  /portafolio/proyectos/{id}/cancelaciones:
    post:
      tags:
        - Portafolio - Seguimiento - Transiciones
      summary: Cancelar el proyecto (T074)
      operationId: cancelarProyecto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveProfile"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelacionRequest"
      responses:
        "200":
          description: Proyecto cancelado.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransicionResponse"
        "403":
          description: ASSIGNMENT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: STATE_TRANSITION_NOT_ALLOWED o CANCELLED_NO_OUT_TRANSITION.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "412":
          description: STATE_CHANGED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: EVIDENCE_NOT_ELIGIBLE u OBSERVATION_REQUIRED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "428":
          description: IF_MATCH_REQUIRED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []
  /seguridad/matrices/versiones:
    get:
      tags: [Seguridad - Matriz funcional]
      summary: Consultar historial paginado de matrices
      operationId: listarVersionesMatriz
      parameters:
        - { name: pagina, in: query, schema: { type: integer, minimum: 0, default: 0 } }
        - { name: tamanio, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200": { description: Historial autorizado de matrices, content: { application/json: { schema: { $ref: "#/components/schemas/MatrixVersionPage" } } } }
        "403": { description: ASSIGNMENT_SCOPE_DENIED. }
      security: [{ bearerAuth: [] }]
    post:
      tags: [Seguridad - Matriz funcional]
      summary: Registrar versión de matriz aprobada externamente
      operationId: crearVersionMatriz
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/MatrixVersionRequest" } } }
      responses:
        "201": { description: Versión inmutable registrada, content: { application/json: { schema: { $ref: "#/components/schemas/MatrixVersionDetail" } } } }
        "403": { description: ASSIGNMENT_SCOPE_DENIED. }
        "409": { description: Idempotency-Key o código de versión duplicado. }
        "422": { description: Documento, aprobador, perfil, unidad o vigencia inválidos. }
      security: [{ bearerAuth: [] }]
  /seguridad/funciones:
    get:
      tags: [Seguridad - Matriz funcional]
      summary: Consultar funciones vigentes e históricas autorizadas
      operationId: listarFuncionesMatriz
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200": { description: Funciones de matriz autorizadas, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MatrixFunction" } } } } }
        "403": { description: ASSIGNMENT_SCOPE_DENIED. }
      security: [{ bearerAuth: [] }]
  /seguridad/matrices/versiones/{id}/combinaciones:
    get:
      tags: [Seguridad - Matriz funcional]
      summary: Consultar combinaciones de una versión
      operationId: listarCombinacionesMatriz
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200": { description: Combinaciones históricas, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MatrixCombination" } } } } }
        "404": { description: MATRIX_VERSION_NOT_FOUND. }
      security: [{ bearerAuth: [] }]
  /seguridad/matrices/combinaciones/{id}/inactivaciones:
    post:
      tags: [Seguridad - Matriz funcional]
      summary: Inactivar combinación mediante una nueva versión
      operationId: inactivarCombinacionMatriz
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/MatrixDeactivationRequest" } } }
      responses:
        "201": { description: Nueva versión con la combinación inactiva, content: { application/json: { schema: { $ref: "#/components/schemas/MatrixVersionDetail" } } } }
        "422": { description: Aprobador, documento o combinación inválidos. }
      security: [{ bearerAuth: [] }]
  /seguridad/asignaciones:
    post:
      tags: [Seguridad - Asignaciones]
      summary: Crear una asignación funcional desde una combinación vigente
      operationId: crearAsignacion
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AssignmentRequest" } } } }
      responses:
        "201": { description: Asignación creada, content: { application/json: { schema: { $ref: "#/components/schemas/AssignmentDetail" } } } }
        "403": { description: ASSIGNMENT_ADMIN_DENIED. }
        "422": { description: Documento, combinación o vigencia inválidos. }
      security: [{ bearerAuth: [] }]
  /seguridad/asignaciones/{id}:
    patch:
      tags: [Seguridad - Asignaciones]
      summary: Cambiar únicamente la vigencia de una asignación
      operationId: cambiarAsignacion
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/IfMatch"
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/AssignmentChangeRequest" } } } }
      responses: { "200": { description: Asignación actualizada, content: { application/json: { schema: { $ref: "#/components/schemas/AssignmentDetail" } } } }, "412": { description: STATE_CHANGED. } }
      security: [{ bearerAuth: [] }]
  /seguridad/asignaciones/{id}/revocaciones:
    post:
      tags: [Seguridad - Asignaciones]
      summary: Revocar una asignación de forma inmediata
      operationId: revocarAsignacion
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/RevocationRequest" } } } }
      responses: { "200": { description: Asignación revocada, content: { application/json: { schema: { $ref: "#/components/schemas/AssignmentDetail" } } } }, "409": { description: LAST_GLOBAL_ADMIN. } }
      security: [{ bearerAuth: [] }]

  # =====================================================================
  # D-03 - Suplencias: gestión de assignaciones temporales.
  # =====================================================================

  /asignaciones/{titularId}/suplencias:
    post:
      tags: [Seguridad - Suplencias]
      summary: Registrar una suplencia para un titular
      description: >-
        Crea una asignación suplente temporal vinculada al titular. La fecha de
        inicio debe ser estrictamente posterior a la fecha actual. El titular
        original debe tener una asignación vigente. La cabecera Idempotency-Key
        es obligatoria.
      operationId: registrarSuplencia
      parameters:
        - name: titularId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuplenciaRequest"
      responses:
        "201":
          description: Suplencia creada.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuplenciaDetail"
        "400":
          description: Solicitud malformada o falta Idempotency-Key.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: ASSIGNMENT_SCOPE_DENIED o SUPLENTE_NOT_AUTHORIZED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: TITULAR_NOT_ACTIVE o SUPLENCIA_OVERLAP.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: SUPLENCIA_DATE_INVALID o SUPLENTE_REQUIRES_ASSIGNMENT.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security: [{ bearerAuth: [] }]

  /suplencias/{id}/terminaciones:
    post:
      tags: [Seguridad - Suplencias]
      summary: Terminar una suplencia de forma anticipada
      description: >-
        Registra la terminación anticipada de una suplencia. La fecha de
        terminación es la fecha servidor. No elimina el registro; permanece
        para auditoría. La cabecera If-Match es obligatoria.
      operationId: terminarSuplencia
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/IfMatch"
      responses:
        "200":
          description: Suplencia terminada.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuplenciaDetail"
        "404":
          description: SUPLENCIA_NOT_FOUND.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: SUPLENCIA_ALREADY_TERMINATED o STATE_CHANGED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "412":
          description: STATE_CHANGED por ETag obsoleto.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "428":
          description: IF_MATCH_REQUIRED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security: [{ bearerAuth: [] }]

  /seguridad/usuarios:
    post:
      tags: [Seguridad - Aprovisionamiento]
      summary: Aprovisionar usuario institucional con Keycloak primero
      description: >-
        Crea la identidad deshabilitada en Keycloak con acción de correo y registra el
        usuario en Oracle PIIP. Si Keycloak tiene éxito y Oracle falla, conserva la
        identidad deshabilitada y devuelve 202 con estado recuperable; la operación
        admite reintento sin duplicar la identidad. No existe endpoint, comando ni
        cliente OIDC de bootstrap del primer GlobalAdmin; esa inicialización pertenece
        a la semilla SQL 021. Nunca se acepta contraseña, token ni atributo sensible.
      operationId: aprovisionarUsuario
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateUserRequest" } } } }
      responses:
        "202":
          description: Operación registrada; consultar y reintentar si el estado es recuperable.
          content: { application/json: { schema: { $ref: "#/components/schemas/ProvisioningResult" } } }
        "400": { description: PROVISIONING_REQUEST_REQUIRED, PROVISIONING_EMAIL_REQUIRED, PROVISIONING_NAME_REQUIRED, PROVISIONING_UNIT_REQUIRED. }
        "403": { description: ASSIGNMENT_ADMIN_DENIED. }
        "409": { description: Idempotency-Key con payload distinto. }
        "422": { description: PROVISIONING_UNIT_NOT_FOUND. }
        "502": { description: KEYCLOAK_CREATION_FAILED. }
        "503":
          description: KEYCLOAK_OPERATION_RECOVERABLE.
          content: { application/problem+json: { schema: { $ref: "#/components/schemas/KeycloakRecoverableProblem" } } }
      security: [{ bearerAuth: [] }]
  /seguridad/usuarios/operaciones/{operacionId}:
    get:
      tags: [Seguridad - Aprovisionamiento]
      summary: Consultar el estado de una operación de aprovisionamiento
      description: >-
        Devuelve el estado actual de la operación revalidando la autorización efectiva
        contra Oracle. Solo el administrador que inició la operación o GlobalAdmin
        institucional pueden consultarla; UnidadAdmin puede consultarla únicamente
        dentro de su ámbito. La respuesta incluye si el estado es recuperable.
      operationId: consultarOperacionAprovisionamiento
      parameters:
        - { name: operacionId, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200": { description: Estado actual de la operación., content: { application/json: { schema: { $ref: "#/components/schemas/ProvisioningResult" } } } }
        "403": { description: ASSIGNMENT_SCOPE_DENIED. }
        "404": { description: PROVISIONING_OPERATION_NOT_FOUND. }
      security: [{ bearerAuth: [] }]
  /seguridad/usuarios/operaciones/{operacionId}/reintentos:
    post:
      tags: [Seguridad - Aprovisionamiento]
      summary: Reintentar una operación de aprovisionamiento recuperable
      description: >-
        Continúa una operación en estado KEYCLOAK_CREADO_DESHABILITADO u ORACLE_PENDIENTE
        revalidando la autorización efectiva contra Oracle y conservando el sub de
        Keycloak sin crear otra identidad. Incrementa el contador de intentos y, ante
        nuevo fallo Oracle, conserva la identidad deshabilitada y devuelve 503.
      operationId: reintentarAprovisionamiento
      parameters:
        - { name: operacionId, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Operación actualizada., content: { application/json: { schema: { $ref: "#/components/schemas/ProvisioningResult" } } } }
        "403": { description: ASSIGNMENT_ADMIN_DENIED. }
        "409": { description: PROVISIONING_NOT_RECOVERABLE. }
        "422": { description: PROVISIONING_UNIT_MISSING. }
        "503":
          description: KEYCLOAK_OPERATION_RECOVERABLE.
          content: { application/problem+json: { schema: { $ref: "#/components/schemas/KeycloakRecoverableProblem" } } }
      security: [{ bearerAuth: [] }]
  /seguridad/usuarios/{id}/desactivaciones:
    post:
      tags: [Seguridad - Aprovisionamiento]
      summary: Desactivar un usuario institucional
      description: >-
        Bloquea la identidad en Keycloak y PIIP de forma inmediata conservando
        registros y asignaciones locales para auditoría. El motivo es obligatorio.
      operationId: desactivarUsuario
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UserStatusRequest" } } } }
      responses:
        "200": { description: Usuario desactivado., content: { application/json: { schema: { $ref: "#/components/schemas/UserStatusResult" } } } }
        "404": { description: PROVISIONING_USER_NOT_FOUND. }
        "409": { description: PROVISIONING_USER_ALREADY_DISABLED. }
        "502": { description: KEYCLOAK_DEACTIVATION_FAILED. }
      security: [{ bearerAuth: [] }]
  /seguridad/usuarios/{id}/reactivaciones:
    post:
      tags: [Seguridad - Aprovisionamiento]
      summary: Reactivar un usuario institucional
      description: >-
        Habilita la identidad en Keycloak y PIIP. No restaura asignaciones revocadas
        ni vencidas. La autoridad debe coincidir con la que autorizó la desactivación.
      operationId: reactivarUsuario
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/UserStatusRequest" } } } }
      responses:
        "200": { description: Usuario reactivado., content: { application/json: { schema: { $ref: "#/components/schemas/UserStatusResult" } } } }
        "404": { description: PROVISIONING_USER_NOT_FOUND. }
        "409": { description: PROVISIONING_USER_ALREADY_ACTIVE. }
        "502": { description: KEYCLOAK_REACTIVATION_FAILED. }
      security: [{ bearerAuth: [] }]

  # =====================================================================
  # D-02 - Organización: unidades, objetivos PEI y actividades POI.
  # =====================================================================

  /organizacion/unidades:
    get:
      tags: [Organización]
      summary: Listar unidades organizacionales vigentes
      description: >-
        Devuelve el catálogo de unidades organizacionales activas del MIDAGRI.
        La consulta no exige asignación efectiva; cualquier usuario autenticado
        puede consultar el catálogo para poblar selects y controles.
      operationId: listarUnidades
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Catálogo de unidades.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UnidadOrganizacional"
        "401":
          description: Autenticación requerida.
      security: [{ bearerAuth: [] }]

  /organizacion/objetivos-pei:
    get:
      tags: [Organización]
      summary: Listar objetivos estratégicos institucionales (PEI)
      description: >-
        Devuelve los objetivos estratégicos institucionales vigentes del PEI
        activo. La consulta no exige asignación efectiva.
      operationId: listarObjetivosPei
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Objetivos PEI vigentes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ObjetivoPei"
        "401":
          description: Autenticación requerida.
      security: [{ bearerAuth: [] }]

  /organizacion/actividades-poi:
    get:
      tags: [Organización]
      summary: Listar actividades del Plan Operativo Institucional (POI)
      description: >-
        Devuelve las actividades POI asociadas a los objetivos PEI vigentes.
        Admite filtro opcional por objetivoPeiId. La consulta no exige
        asignación efectiva.
      operationId: listarActividadesPoi
      parameters:
        - name: objetivoPeiId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Actividades POI.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActividadPoi"
        "401":
          description: Autenticación requerida.
      security: [{ bearerAuth: [] }]

  # =====================================================================
  # US7 - Consulta institucional por ámbito y clasificación (T098).
  # =====================================================================

  /consulta/institucional/portafolio:
    get:
      tags: [Consulta - Institucional]
      summary: Buscar portafolio institucional por ámbito y clasificación
      description: >-
        Busca registros del portafolio aplicando los filtros canónicos y la
        paginación dentro del ámbito autorizado. La respuesta nunca incluye
        entidades JPA ni contenido/descarga documental. Las cabeceras
        canónicas X-Asignacion-Efectiva-Id y X-Correlation-Id son obligatorias.
        La respuesta incluye la cabecera ETag agregada de la página para
        soportar concurrencia optimista con If-None-Match.
      operationId: buscarPortafolioInstitucional
      parameters:
        - { name: tipo, in: query, required: false, schema: { $ref: "#/components/schemas/TipoRegistroConsulta" } }
        - { name: codigo, in: query, required: false, schema: { type: string } }
        - { name: nombre, in: query, required: false, schema: { type: string } }
        - { name: estado, in: query, required: false, schema: { $ref: "#/components/schemas/EstadoIniciativaConsulta" } }
        - { name: unidadId, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: responsableId, in: query, required: false, schema: { type: integer, format: int64 } }
        - { name: fechaDesde, in: query, required: false, schema: { type: string, format: date } }
        - { name: fechaHasta, in: query, required: false, schema: { type: string, format: date } }
        - { name: page, in: query, schema: { type: integer, minimum: 0, default: 0 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: sort, in: query, required: false, schema: { type: string, enum: [codigo, nombre, estado, fechaInicio] } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Página de portafolio institucional dentro del ámbito del actor.
          headers:
            ETag: { description: Identificador de versión de la página., schema: { type: string } }
            X-Correlation-Id: { description: Identificador de correlación., schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionalPortfolioPage" }
        "400": { description: Solicitud malformada. }
        "401": { description: Asignación efectiva ausente o autenticación requerida. }
        "403": { description: ASSIGNMENT_SCOPE_DENIED. }
        "422": { description: Filtros inválidos. }
      security: [{ bearerAuth: [] }]

  /consulta/institucional/portafolio/{id}:
    get:
      tags: [Consulta - Institucional]
      summary: Ver detalle institucional del registro
      description: >-
        Devuelve el detalle institucional de un registro del portafolio. La
        respuesta nunca expone BLOB, clave física ni URL directa de
        documentos; el contenido se obtiene por el endpoint
        /api/v1/documentos/{id}/contenido con la revalidación obligatoria
        de ámbito y clasificación. Si el registro no pertenece al ámbito
        del actor se responde 404 sin confirmar su existencia. Soporta
        concurrencia optimista mediante If-Match y validación de caché
        mediante If-None-Match.
      operationId: detallePortafolioInstitucional
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: If-Match, in: header, required: false, schema: { type: string } }
        - { name: If-None-Match, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Detalle institucional del registro dentro del ámbito del actor.
          headers:
            ETag: { description: Identificador de versión del registro., schema: { type: string } }
            X-Correlation-Id: { description: Identificador de correlación., schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstitutionalPortfolioDetail" }
        "304": { description: Recurso no modificado por ETag. }
        "400": { description: Solicitud malformada. }
        "401": { description: Asignación efectiva ausente o autenticación requerida. }
         "403": { description: ASSIGNMENT_SCOPE_DENIED. }
         "404": { description: Recurso fuera de ámbito o no visible. }
         "412": { description: STATE_CHANGED por ETag obsoleto. }
       security: [{ bearerAuth: [] }]

  /documentos/{id}/contenido:
    get:
      tags: [Documentos - Contenido]
      summary: Descargar contenido institucional
      description: >-
        Devuelve el BLOB y los metadatos de un documento a un usuario
        institucional autorizado. La operación revalida la asignación
        efectiva, el ámbito y la clasificación validada antes de
        exponer el contenido; nunca se entrega a la consulta pública
        ni a usuarios sin asignación efectiva. Soporta concurrencia
        optimista mediante If-None-Match.
      operationId: descargarContenidoInstitucional
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: If-None-Match, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - { name: X-Actor-Sub, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
        - { name: X-Unidad-Recurso-Id, in: header, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Contenido del documento con su clasificación validada.
          headers:
            ETag: { description: Versión optimista del documento., schema: { type: string } }
            X-Clasificacion-Validada: { description: Clasificación validada al servir., schema: { type: string } }
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        "304": { description: Recurso no modificado por ETag. }
        "400": { description: Solicitud malformada. }
        "403": { description: Asignación efectiva insuficiente o clasificación pendiente. }
        "404": { description: Documento no encontrado en el ámbito. }
      security: [{ bearerAuth: [] }]

  /documentos/{id}/clasificacion/validacion:
    post:
      tags: [Documentos - Clasificación]
      summary: Validar clasificación inicial
      description: >-
        Confirma la clasificación inicial propuesta por el Responsable.
        La fecha del servidor la aplica el DEFAULT SYSTIMESTAMP del DDL
        004. Solo un Evaluador puede validar; la operación exige If-Match.
      operationId: validarClasificacionDocumento
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: If-Match, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - { name: X-Actor-Sub, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
        - { name: X-Unidad-Recurso-Id, in: header, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ValidarClasificacionRequest" }
      responses:
        "200":
          description: Clasificación validada con fecha del servidor.
          headers:
            ETag: { description: Versión optimista del documento., schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ValidacionClasificacionResult" }
        "400": { description: Solicitud malformada. }
        "403": { description: Asignación efectiva insuficiente. }
        "404": { description: Documento no encontrado. }
        "409": { description: Intento de relajar la clasificación. }
        "412": { description: ETag ausente o mismatch. }
        "428": { description: If-Match obligatorio. }
      security: [{ bearerAuth: [] }]

  /documentos/{id}/clasificacion/reclasificacion:
    post:
      tags: [Documentos - Clasificación]
      summary: Reclasificar documento
      description: >-
        Aplica una reclasificación con la decisión formal de la
        Autoridad. La reclasificación nunca puede ser menos restrictiva
        y se registra en el historial append-only. Una reclasificación a
        PUBLICO exige además un documento formal de decisión registrado.
      operationId: reclasificarDocumento
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: If-Match, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - { name: X-Actor-Sub, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
        - { name: X-Unidad-Recurso-Id, in: header, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReclasificarDocumentoRequest" }
      responses:
        "200":
          description: Reclasificación aplicada.
          headers:
            ETag: { description: Versión optimista del documento., schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReclasificacionDocumentoResult" }
        "400": { description: Solicitud malformada. }
        "403": { description: Asignación efectiva insuficiente. }
        "404": { description: Documento no encontrado. }
        "409": { description: Reclasificación no permitida o sin cambio. }
        "412": { description: ETag ausente o mismatch. }
        "428": { description: If-Match obligatorio. }
      security: [{ bearerAuth: [] }]

  /documentos/{id}/clasificacion/historial:
    get:
      tags: [Documentos - Clasificación]
      summary: Historial de reclasificación
      description: >-
        Devuelve el historial append-only de reclasificaciones
        registradas para el documento, en orden cronológico. No expone
        contenido ni datos personales innecesarios.
      operationId: historialReclasificacionDocumento
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - { name: X-Actor-Sub, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
        - { name: X-Unidad-Recurso-Id, in: header, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: Historial devuelto.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ClasificacionHistDetalle" }
        "403": { description: Asignación efectiva insuficiente. }
        "404": { description: Documento no encontrado. }
      security: [{ bearerAuth: [] }]

  /documentos/publicaciones:
    post:
      tags: [Documentos - Publicación]
      summary: Confirmar publicación de una versión PUBLICO
      description: >-
        Confirma la publicación de una versión con clasificación PUBLICO
        validada. La fecha de publicación es exclusivamente del servidor
        y la operación es idempotente mediante Idempotency-Key. La
        respuesta nunca expone el BLOB ni una URL de descarga.
      operationId: confirmarPublicacionDocumento
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - { name: X-Actor-Sub, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
        - { name: X-Unidad-Recurso-Id, in: header, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PublicarDocumentoRequest" }
      responses:
        "201":
          description: Publicación confirmada con fecha del servidor.
          headers:
            ETag: { description: Identificador de la versión., schema: { type: string } }
            X-Publicacion-Id: { description: Identificador append-only de la publicación., schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicacionDocumentoDetail" }
        "400": { description: Solicitud malformada. }
        "403": { description: Asignación efectiva insuficiente. }
        "404": { description: Documento no encontrado. }
        "409": { description: Publicación duplicada o clave de idempotencia con payload distinto. }
        "422": { description: Clasificación validada no es PUBLICO o título público inválido. }
      security: [{ bearerAuth: [] }]

  /consulta/publica/portafolio:
    get:
      tags: [Consulta - Pública]
      summary: Buscar portafolio público
      description: >-
        Busca registros del portafolio aplicando filtros mínimos
        permitidos. La respuesta es anónima y solo incluye los cuatro
        campos públicos y los metadatos de las publicaciones elegibles.
        No expone responsable, notas ni contenido.
      operationId: buscarPortafolioPublico
      parameters:
        - { name: tipo, in: query, required: false, schema: { type: string, enum: [INICIATIVA, PROYECTO] } }
        - { name: codigo, in: query, required: false, schema: { type: string } }
        - { name: nombre, in: query, required: false, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 0, default: 0 } }
        - { name: size, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Página pública anónima de resultados.
          headers:
            ETag: { description: Versión de la página., schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicPortfolioPage" }
        "400": { description: Solicitud malformada. }

  /consulta/publica/portafolio/{id}:
    get:
      tags: [Consulta - Pública]
      summary: Ver detalle público del registro
      description: >-
        Devuelve el detalle público de un registro del portafolio. La
        respuesta nunca expone contenido ni una URL de descarga. Si el
        registro no es elegible para consulta pública, se responde 404
        sin confirmar su existencia.
      operationId: detallePortafolioPublico
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: If-None-Match, in: header, required: false, schema: { type: string } }
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Detalle público del registro.
          headers:
            ETag: { description: Versión del detalle., schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PublicPortfolioDetail" }
        "304": { description: El detalle no cambió. }
        "404": { description: Registro no elegible o no visible. }

  /reportes/semestrales/generaciones:
    post:
      tags:
        - Reportes institucionales
      summary: Generar reporte institucional semestral
      description: >-
        Genera el reporte semestral oficial (BR-013, BR-121, BR-122) con cortes
        30/06 (semestre 1) o 31/12 (semestre 2). El servidor deriva el periodo
        y la fecha de corte; no se acepta una fecha alternativa. La generacion
        es idempotente por Idempotency-Key; misma clave y mismo payload
        devuelven el mismo reporte sin duplicar filas. La operacion exige
        X-Asignacion-Efectiva-Id con perfil Evaluador efectivo. Devuelve 202
        con la operacion registrada y, posteriormente, los archivos PDF y XLSX
        comparten el mismo snapshot, parametros y version de datos.
      operationId: generarReporteSemestral
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveProfile"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SemestralReportRequest"
      responses:
        "202":
          description: Reporte generado; pendiente de aprobacion.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportOperation" }
        "400":
          description: Solicitud malformada o falta X-Asignacion-Efectiva-Id o Idempotency-Key.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "403":
          description: REPORT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "409":
          description: Idempotency-Key reutilizada con payload distinto.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "422":
          description: SEMESTER_INVALID o REPORT_CUTOFF_INVALID.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
      security:
        - bearerAuth: []

  /reportes/extraordinarios/generaciones:
    post:
      tags:
        - Reportes institucionales
      summary: Generar reporte institucional extraordinario
      description: >-
        Genera un reporte extraordinario (BR-120, BR-121, BR-122, BR-123) con
        solicitud y aprobacion documentadas obligatorias. Los filtros se
        limitan a los campos aprobados por BR-123 y no exceden el ambito del
        generador. La operacion es idempotente por Idempotency-Key. Devuelve
        202 con la operacion registrada; PDF y XLSX se emiten a partir del
        mismo snapshot, parametros y version de datos.
      operationId: generarReporteExtraordinario
      parameters:
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveProfile"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtraordinarioReportRequest"
      responses:
        "202":
          description: Reporte generado; pendiente de aprobacion.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReportOperation" }
        "400":
          description: Solicitud malformada o falta X-Asignacion-Efectiva-Id o Idempotency-Key.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "403":
          description: REPORT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "409":
          description: Idempotency-Key reutilizada con payload distinto.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "422":
          description: REPORT_REQUEST_APPROVAL_REQUIRED o REPORT_CUTOFF_INVALID.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
      security:
        - bearerAuth: []

  /reportes/generaciones/{id}:
    get:
      tags:
        - Reportes institucionales
      summary: Consultar reporte institucional
      description: >-
        Devuelve el detalle del reporte, sus indicadores BR-122, sus totales
        BR-121 y sus archivos PDF/XLSX. La respuesta incluye el ETag para
        control de concurrencia.
      operationId: consultarReporte
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveProfile"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Reporte encontrado.
          headers:
            ETag: { description: Version del reporte., schema: { type: string } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReporteDetail" }
        "403":
          description: REPORT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "404":
          description: REPORT_NOT_FOUND.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
      security:
        - bearerAuth: []

  /reportes/generaciones/{id}/archivos/{formato}:
    get:
      tags:
        - Reportes institucionales
      summary: Descargar archivo institucional
      description: >-
        Devuelve el PDF oficial o el XLSX de detalle generado a partir del
        mismo snapshot, parametros y version de datos. La operacion requiere
        asignacion efectiva y perfil Evaluador o Autoridad.
      operationId: descargarArchivoReporte
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: formato, in: path, required: true, schema: { type: string, enum: [PDF, XLSX] } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveProfile"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Archivo emitido.
          headers:
            ETag: { description: Hash SHA-256 del archivo., schema: { type: string } }
          content:
            application/pdf: { schema: { type: string, format: binary } }
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet: { schema: { type: string, format: binary } }
        "404":
          description: REPORT_FILE_NOT_FOUND o REPORT_NOT_FOUND.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "422":
          description: REPORT_FORMAT_INVALID.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
      security:
        - bearerAuth: []

  /reportes/generaciones/{id}/aprobaciones-remision:
    post:
      tags:
        - Reportes institucionales
      summary: Aprobar version de reporte institucional
      description: >-
        La Oficina de Modernizacion aprueba la version exacta del reporte
        (BR-127), fija el documento de aprobacion y los destinatarios
        permitidos (BR-125). La operacion es idempotente por Idempotency-Key.
        Una segunda aprobacion para la misma version produce 409
        REPORT_VERSION_ALREADY_APPROVED. Sin plazo de retencion confirmado no
        existe eliminacion automatica.
      operationId: aprobarReporte
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveProfile"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReporteAprobacionRequest"
      responses:
        "201":
          description: Aprobacion registrada.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReporteAprobacionDetail" }
        "403":
          description: REPORT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "409":
          description: REPORT_VERSION_ALREADY_APPROVED o
            REPORT_NOT_READY_FOR_APPROVAL.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "422":
          description: RECIPIENT_TYPE_INVALID o RECIPIENT_TYPE_REQUIRED.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
      security:
        - bearerAuth: []

  /reportes/generaciones/{id}/destinatarios:
    get:
      tags:
        - Reportes institucionales
      summary: Listar destinatarios aprobados
      description: >-
        Devuelve los destinatarios aprobados en la ultima version aprobada
        del reporte (BR-125).
      operationId: listarDestinatariosReporte
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveProfile"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Destinatarios aprobados.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DestinatarioReporteDetail" }
        "403":
          description: REPORT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "404":
          description: REPORT_NOT_FOUND.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
      security:
        - bearerAuth: []

  /reportes/generaciones/{id}/remisiones:
    get:
      tags:
        - Reportes institucionales
      summary: Consultar historial de remisiones
      description: >-
        Devuelve las remisiones registradas de un reporte, opcionalmente
        filtradas por version. Permite reconstruir la trazabilidad sin perder
        evidencia.
      operationId: consultarRemisionesReporte
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - { name: idVersion, in: query, required: false, schema: { type: integer } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveProfile"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
      responses:
        "200":
          description: Remisiones registradas.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReporteRemisionPage" }
        "403":
          description: REPORT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "404":
          description: REPORT_NOT_FOUND.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
      security:
        - bearerAuth: []
    post:
      tags:
        - Reportes institucionales
      summary: Registrar remision manual recuperable
      description: >-
        Registra la remision manual contra los destinatarios aprobados
        (BR-125, BR-128). El resultado es declarativo; FALLIDA exige motivo.
        La remision automatica, el correo y los conectores externos estan
        fuera del alcance constitucional.
      operationId: remitirReporte
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/EffectiveProfile"
        - $ref: "#/components/parameters/EffectiveUnitId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReporteRemisionRequest"
      responses:
        "201":
          description: Remision registrada.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReporteRemisionPage" }
        "403":
          description: REPORT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "409":
          description: REPORT_VERSION_NOT_APPROVED o REPORT_REMITTAL_DUPLICATED.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
        "422":
          description: RECIPIENT_NOT_APPROVED, REMITTAL_MOTIVE_REQUIRED
            o REMITTAL_RESULT_INVALID.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetail" }
      security:
        - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    EffectiveAssignmentId:
      name: X-Asignacion-Efectiva-Id
      in: header
      required: true
      schema:
        type: string
      description: Identificador de la unica asignacion efectiva de la operacion institucional.
    EffectiveUnitId:
      name: X-Unidad-Efectiva-Id
      in: header
      required: true
      schema: { type: integer, format: int64 }
      description: Unidad exacta del contexto efectivo que Oracle revalida.
    EffectiveProfile:
      name: X-Perfil-Efectivo
      in: header
      required: true
      schema:
        type: string
      description: Perfil de la asignación efectiva que Oracle revalida para la operación.
    ActorSub:
      name: X-Actor-Sub
      in: header
      required: false
      schema:
        type: string
      description: Subject estable de la identidad autenticada en Keycloak.
    ActorUsuarioId:
      name: X-Actor-Usuario-Id
      in: header
      required: false
      schema:
        type: integer
        format: int64
      description: Identificador del usuario PIIP asociado a la identidad.
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
      description: Identificador de correlacion devuelto por el servidor.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        maxLength: 100
      description: >-
        Clave de idempotencia. Misma clave y mismo payload devuelven el resultado original;
        una clave con payload distinto produce 409 Conflict.
    IdempotencyKeyOptional:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 100
      description: >-
        Clave de idempotencia opcional. Si se envia y el servicio de idempotencia esta
        disponible, misma clave y mismo payload retornan el resultado original; payload
        distinto produce 409 Conflict. Si no se envia, la deduplicacion por hash y
        responsable es la proteccion primaria.
    IfMatch:
      name: If-Match
      in: header
      required: false
      schema:
        type: string
      description: ETag esperado para control de concurrencia optimista. Si se envia y no coincide, la operacion se rechaza con 409.
  schemas:
