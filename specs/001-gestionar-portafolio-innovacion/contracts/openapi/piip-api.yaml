        entregables y periodos quincenales). La cabecera Idempotency-Key es obligatoria
        y X-Asignacion-Efectiva-Id identifica la asignacion efectiva del Responsable
        titular. La planificacion es append-only: las correcciones crean versiones
        adicionales conservando la fila anterior.
      operationId: registrarPlanificacion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
        - $ref: "#/components/parameters/ActorSub"
        - $ref: "#/components/parameters/ActorUsuarioId"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanificacionRequest"
      responses:
        "201":
          description: Planificacion registrada.
          headers:
            ETag:
              description: Identificador de version para concurrencia.
              schema:
                type: string
          content:
            application/json:
              schema:
