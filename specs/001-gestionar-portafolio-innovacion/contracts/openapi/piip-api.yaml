              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "403":
          description: ASSIGNMENT_SCOPE_DENIED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "409":
          description: PLANIFICACION_ALREADY_EXISTS o PROJECT_NOT_IN_EXECUTION.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
        "422":
          description: VALIDATION_FAILED.
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ProblemDetail"
      security:
        - bearerAuth: []
    get:
      tags:
        - Portafolio - Seguimiento
      summary: Listar planificaciones del proyecto
      operationId: listarPlanificaciones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - $ref: "#/components/parameters/EffectiveAssignmentId"
      responses:
        "200":
          description: Planificaciones del proyecto.
