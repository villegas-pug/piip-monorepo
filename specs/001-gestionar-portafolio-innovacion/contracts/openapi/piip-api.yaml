        dificultades:
          type: string
          maxLength: 2000
        proximasAcciones:
          type: string
          maxLength: 2000

    AnexarCicloVersionRequest:
      type: object
      required: [motivo, objetivos, actividades, avance]
      properties:
        motivo:
          type: string
          maxLength: 2000
        objetivos:
          type: string
          maxLength: 2000
        actividades:
          type: string
          maxLength: 2000
        avance:
          type: integer
          minimum: 0
          maximum: 100
        dificultades:
          type: string
          maxLength: 2000
        proximasAcciones:
          type: string
          maxLength: 2000

    CicloResponse:
      type: object
      required: [idCiclo, idProyecto, periodo, numeroVersion, cerrado, etag]
      properties:
        idCiclo:
          type: integer
          format: int64
        idProyecto:
          type: integer
          format: int64
        periodo:
          type: string
        numeroVersion:
          type: integer
        idVersionAnterior:
          type: integer
          format: int64
        objetivos:
          type: string
        actividades:
          type: string
        avance:
          type: integer
        dificultades:
          type: string
        proximasAcciones:
          type: string
        cerrado:
          type: string
          enum: [S, N]
        fechaCierre:
          type: string
          format: date-time
        etag:
          type: string

    CicloVersionResponse:
      type: object
      required: [idVersion, idCiclo, numeroVersion, etag]
      properties:
        idVersion:
          type: integer
          format: int64
        idCiclo:
          type: integer
          format: int64
        numeroVersion:
          type: integer
        motivo:
          type: string
        objetivos:
          type: string
        actividades:
          type: string
        avance:
          type: integer
        dificultades:
          type: string
        proximasAcciones:
          type: string
        etag:
          type: string

    AdjuntarEvidenciaCicloRequest:
      type: object
      required: [idDocumento, tipoDocumental]
      properties:
        idDocumento:
          type: integer
          format: int64
        tipoDocumental:
          type: string
          maxLength: 200

    AltaPersonaRequest:
      type: object
      required: [rol]
      properties:
        personaId:
          type: integer
          format: int64
        rol:
          type: string
          enum: [Responsable, Participante]
        nombresCompletos:
          type: string
          maxLength: 300
        institucion:
          type: string
          maxLength: 200
        funcion:
          type: string
          maxLength: 200

    AltaUnidadRequest:
      type: object
      required: [unidadId, rol]
      properties:
        unidadId:
          type: integer
          format: int64
        rol:
          type: string
          enum: [Responsable, Participante]

    BajaParticipanteRequest:
      type: object
      required: [fechaBaja]
      properties:
        fechaBaja:
          type: string
          format: date
        motivo:
          type: string
          maxLength: 2000

    ParticipanteResponse:
      type: object
      required: [idParticipacion, proyectoId, rol, estado, etag]
      properties:
        idParticipacion:
          type: integer
          format: int64
        proyectoId:
          type: integer
          format: int64
        personaId:
          type: integer
          format: int64
        unidadId:
          type: integer
          format: int64
        rol:
          type: string
        nombresCompletos:
          type: string
        institucion:
          type: string
        funcion:
          type: string
        estado:
          type: string
          enum: [VIGENTE, BAJA]
        fechaAlta:
          type: string
          format: date
        fechaBaja:
          type: string
          format: date
        etag:
          type: string

    EditarCamposEditablesRequest:
      type: object
      properties:
        documentacionGestion:
          type: string
          maxLength: 2000
        resultadosClave:
          type: string
          maxLength: 2000
        nota:
          type: string
          maxLength: 1000

    PresentacionProductoFinalRequest:
      type: object
      required: [tipoProductoFinal, idDocumentoSustenta, evidenciaIds]
      properties:
        tipoProductoFinal:
          type: string
          enum: [PROTOTIPO_CONCEPTUALIZADO, SOLUCION_FUNCIONAL]
        documentacionGestion:
          type: string
          maxLength: 2000
        resultadosClave:
          type: string
          maxLength: 2000
        nota:
          type: string
          maxLength: 1000
        idDocumentoSustenta:
          type: integer
          format: int64
        evidenciaIds:
          type: array
          items:
            type: integer
            format: int64

    PresentacionProductoFinalResponse:
      type: object
      required: [idPresentacion, idProyecto, version, evidenciaIds, etag]
      properties:
        idPresentacion:
          type: integer
          format: int64
        idProyecto:
          type: integer
          format: int64
        version:
          type: integer
        idVersionAnterior:
          type: integer
          format: int64
        tipoProductoFinal:
          type: string
        documentacionGestion:
          type: string
        resultadosClave:
          type: string
        nota:
          type: string
        idDocumentoSustenta:
          type: integer
          format: int64
        evidenciaIds:
          type: array
          items:
            type: integer
            format: int64
        etag:
          type: string

    DecisionProductoFinalRequest:
      type: object
      required: [decision, tipoProductoFinal]
      properties:
        decision:
          type: string
          enum: [APROBAR, NO_APROBAR]
        documentoId:
          type: integer
          format: int64
          description: Obligatorio cuando decision es APROBAR.
        evidenciaId:
          type: integer
          format: int64
          description: Obligatorio cuando decision es NO_APROBAR.
        tipoProductoFinal:
          type: string
          enum: [PROTOTIPO_CONCEPTUALIZADO, SOLUCION_FUNCIONAL]
        observacion:
          type: string
          maxLength: 2000
          description: Obligatoria cuando decision es NO_APROBAR.

    DecisionProductoFinalResponse:
      type: object
      required: [idProyecto, estado, tipoProductoFinal, idTransicion, fechaDecision, etag]
      properties:
        idProyecto: { type: integer, format: int64 }
        estado:
          type: string
          enum: [PRODUCTO_APROBADO, PRODUCTO_NO_APROBADO]
        tipoProductoFinal:
          type: string
          enum: [PROTOTIPO_CONCEPTUALIZADO, SOLUCION_FUNCIONAL]
        idTransicion: { type: integer, format: int64 }
        fechaDecision: { type: string, format: date-time }
        etag: { type: string }

    CierreProyectoRequest:
      type: object
      required: [informeFinal, informeFinalDocumentoId, aprendizajes, conclusion, observacion]
      properties:
        informeFinal:
          type: string
          minLength: 1
        informeFinalDocumentoId:
          type: integer
          format: int64
        aprendizajes:
          type: string
          minLength: 1
        conclusion:
          type: string
          minLength: 1
          maxLength: 2000
        observacion:
          type: string
          minLength: 1
          maxLength: 2000

    CierreProyectoResponse:
      type: object
      required: [idCierre, idProyecto, estado, fechaCierre, etag]
      properties:
        idCierre: { type: integer, format: int64 }
        idProyecto: { type: integer, format: int64 }
        estado:
          $ref: "#/components/schemas/EstadoIniciativa"
        fechaCierre: { type: string, format: date }
        etag: { type: string }

    SuspensionRequest:
      type: object
      required: [idDocumento, observacion]
      properties:
        idDocumento:
          type: integer
          format: int64
        observacion:
          type: string
          maxLength: 2000
        ifMatch:
          type: string
          maxLength: 200

    CancelacionRequest:
      type: object
      required: [idDocumento, observacion]
      properties:
        idDocumento:
          type: integer
          format: int64
        observacion:
          type: string
          maxLength: 2000
        ifMatch:
          type: string
          maxLength: 200

    TransicionResponse:
      type: object
      required: [idTransicion, idProyecto, estadoNuevo, etag]
      properties:
        idTransicion:
          type: integer
          format: int64
        idProyecto:
          type: integer
          format: int64
        estadoAnterior:
          $ref: "#/components/schemas/EstadoIniciativa"
        estadoNuevo:
          $ref: "#/components/schemas/EstadoIniciativa"
        idUsuario:
          type: integer
          format: int64
        fechaTransicion:
          type: string
          format: date-time
        observaciones:
          type: string
        idDocumento:
          type: integer
          format: int64
        etag:
          type: string
    MatrixFunctionRequest:
      type: object
      required: [codigo, descripcion]
      properties:
        codigo: { type: string, maxLength: 30 }
        descripcion: { type: string, maxLength: 500 }
    MatrixFunction:
      type: object
      required: [id, matrizVersionId, codigo, descripcion, activa]
      properties:
        id: { type: integer, format: int64 }
        matrizVersionId: { type: integer, format: int64 }
        codigo: { type: string }
        descripcion: { type: string }
        activa: { type: boolean }
    MatrixCombinationRequest:
      type: object
      required: [funcionCodigo, perfil, unidadId, vigenteDesde, documentoAprobacionVersionId, aprobadorUsuarioId]
      properties:
        funcionCodigo: { type: string, maxLength: 30 }
        perfil: { type: string, maxLength: 50 }
        unidadId: { type: integer, format: int64 }
        vigenteDesde: { type: string, format: date }
        vigenteHasta: { type: string, format: date }
        documentoAprobacionVersionId: { type: integer, format: int64 }
        aprobadorUsuarioId: { type: integer, format: int64, description: Usuario PIIP activo con perfil Autoridad en la unidad concreta. }
    MatrixVersionRequest:
      type: object
      required: [codigoVersion, vigenteDesde, documentoAprobacionVersionId, funciones, combinaciones]
      properties:
        codigoVersion: { type: string, maxLength: 30 }
        versionAnteriorId: { type: integer, format: int64 }
        vigenteDesde: { type: string, format: date }
        vigenteHasta: { type: string, format: date }
        documentoAprobacionVersionId: { type: integer, format: int64 }
        funciones: { type: array, minItems: 1, items: { $ref: "#/components/schemas/MatrixFunctionRequest" } }
        combinaciones: { type: array, minItems: 1, items: { $ref: "#/components/schemas/MatrixCombinationRequest" } }
    MatrixDeactivationRequest:
      type: object
      required: [codigoNuevaVersion, documentoAprobacionVersionId, aprobadorUsuarioId, motivo]
      properties:
        codigoNuevaVersion: { type: string, maxLength: 30 }
        documentoAprobacionVersionId: { type: integer, format: int64 }
        aprobadorUsuarioId: { type: integer, format: int64 }
        motivo: { type: string, maxLength: 2000 }
    MatrixCombination:
      type: object
      required: [id, matrizVersionId, funcion, perfil, unidadId, vigenteDesde, activa]
      properties:
        id: { type: integer, format: int64 }
        matrizVersionId: { type: integer, format: int64 }
        funcion: { type: string }
        perfil: { type: string }
        unidadId: { type: integer, format: int64 }
        vigenteDesde: { type: string, format: date }
        vigenteHasta: { type: string, format: date }
        activa: { type: boolean }
        documentoAprobacionVersionId: { type: integer, format: int64 }
        aprobadorUsuarioId: { type: integer, format: int64 }
        registradorUsuarioId: { type: integer, format: int64 }
    MatrixVersionDetail:
      type: object
      required: [id, codigoVersion, vigenteDesde, activa, funciones, combinaciones]
      properties:
        id: { type: integer, format: int64 }
        codigoVersion: { type: string }
        versionAnteriorId: { type: integer, format: int64 }
        documentoAprobacionVersionId: { type: integer, format: int64 }
        vigenteDesde: { type: string, format: date }
        vigenteHasta: { type: string, format: date }
        activa: { type: boolean }
        funciones: { type: array, items: { $ref: "#/components/schemas/MatrixFunctionRequest" } }
        combinaciones: { type: array, items: { $ref: "#/components/schemas/MatrixCombination" } }
    MatrixVersionPage:
      type: object
      properties:
        content: { type: array, items: { $ref: "#/components/schemas/MatrixVersionDetail" } }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
    CreateUserRequest:
      type: object
      required: [correoInstitucional, nombreCompleto, unidadId]
      properties:
        correoInstitucional: { type: string, format: email, maxLength: 200 }
        nombreCompleto: { type: string, minLength: 1, maxLength: 300 }
        unidadId: { type: integer, format: int64 }
    UserStatusRequest:
      type: object
      required: [motivo]
      properties:
        motivo: { type: string, minLength: 1, maxLength: 1000 }
    UserStatusResult:
      type: object
      required: [usuarioId, estado]
      properties:
        usuarioId: { type: integer, format: int64 }
        estado: { type: string, enum: [HABILITADO, DESHABILITADO] }
        keycloakId: { type: string, maxLength: 36 }
    ProvisioningResult:
      type: object
      required: [operacionId, estado, recuperable, intento]
      properties:
        operacionId: { type: integer, format: int64 }
        usuarioId: { type: integer, format: int64 }
        estado:
          type: string
          enum: [INICIADA, KEYCLOAK_CREADO_DESHABILITADO, ORACLE_PENDIENTE, COMPLETADA, FALLIDA_NO_RECUPERABLE]
        recuperable: { type: boolean }
        intento: { type: integer, format: int32, minimum: 1 }
    KeycloakRecoverableProblem:
      type: object
      required: [type, title, status, code, operacionId]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer, enum: [503] }
        code: { type: string, enum: [KEYCLOAK_OPERATION_RECOVERABLE] }
        detail: { type: string }
        operacionId: { type: integer, format: int64 }

    # =================================================================
    # US7 - Schemas de la consulta institucional (T098).
    # Son DTOs propios del módulo consulta: nunca exponen entidades
    # JPA ni contenido/descarga documental.
    # =================================================================

    TipoRegistroConsulta:
      type: string
      enum: [INICIATIVA, PROYECTO]

    TipoSolucionConsulta:
      type: string
      enum: [POTENCIAL_ADAPTABLE, POR_DEFINIR]

    FuenteOrigenConsulta:
      type: string
      enum: [FICHA_INICIATIVA, CONCURSO_INTERNO, INNOVACION_ABIERTA, PROPUESTA_JEFATURA, OTROS]

    EstadoIniciativaConsulta:
      type: string
      enum:
        - PRESENTADO
        - NO_ADMISIBLE
        - NO_APLICABLE
        - INICIATIVA_APROBADA
        - INICIATIVA_ARCHIVADA
        - PROYECTO_EJECUCION
        - SUSPENDIDO
        - CANCELADO
        - PRODUCTO_APROBADO
        - PRODUCTO_NO_APROBADO
        - FINALIZADO

    ClasificacionDocumentoConsulta:
      type: string
      enum: [PUBLICO, INTERNO, RESTRINGIDO]

    InstitutionalPortfolioUnidad:
      type: object
      properties:
        id: { type: integer, format: int64 }
        unidadId: { type: integer, format: int64 }
        descripcion: { type: string }
        abreviatura: { type: string }
        nroOrden: { type: integer }
        principal: { type: boolean }

    InstitutionalPortfolioPersonaParticipante:
      type: object
      properties:
        idParticipacion: { type: integer, format: int64 }
        participanteId: { type: integer, format: int64 }
        usuarioId: { type: integer, format: int64 }
        nombresCompletos: { type: string }
        institucion: { type: string }
        funcion: { type: string }
        clasificacion: { type: string }
        fechaInicio: { type: string, format: date }
        fechaFin: { type: string, format: date }
        vigente: { type: boolean }

    InstitutionalPortfolioDocument:
      type: object
      description: >-
        Metadatos documentales visibles para la consulta institucional
        autorizada. No expone BLOB, clave física ni URL directa. El
        contenido se obtiene por el endpoint
        /api/v1/documentos/{id}/contenido.
      properties:
        documentoId: { type: integer, format: int64 }
        serieId: { type: integer, format: int64 }
        numeroVersion: { type: integer }
        titulo: { type: string }
        formato: { type: string }
        mimeType: { type: string }
        tamanoBytes: { type: integer, format: int64 }
        hashSha256: { type: string }
        clasificacionPropuesta: { $ref: "#/components/schemas/ClasificacionDocumentoConsulta" }
        clasificacionValidada: { $ref: "#/components/schemas/ClasificacionDocumentoConsulta" }
        tipoDocumental: { type: string }
        contextoDocumental: { type: string }
        publicado: { type: boolean }
        fechaCarga: { type: string, format: date-time }
        usuarioCargaId: { type: integer, format: int64 }
        puedeConsultarContenido: { type: boolean }
        etag: { type: string }

    InstitutionalPortfolioHistoryEntry:
      type: object
      properties:
        transicionId: { type: integer, format: int64 }
        estadoAnterior: { $ref: "#/components/schemas/EstadoIniciativaConsulta" }
        estadoNuevo: { $ref: "#/components/schemas/EstadoIniciativaConsulta" }
        usuarioId: { type: integer, format: int64 }
        rolEfectivoId: { type: integer }
        unidadEfectivaId: { type: integer, format: int64 }
        fechaTransicion: { type: string, format: date-time }
        observaciones: { type: string }
        documentoRefId: { type: integer, format: int64 }

    IniciativaProyectoRelacion:
      type: object
      properties:
        iniciativaId: { type: integer, format: int64 }
        proyectoId: { type: integer, format: int64 }
        iniciativaActual: { type: boolean }
        proyectoActual: { type: boolean }

    InstitutionalPortfolioSummary:
      type: object
      required: [id, tipoRegistro, codigo, nombre, estado, fechaInicio, etag]
      properties:
        id: { type: integer, format: int64 }
        tipoRegistro: { $ref: "#/components/schemas/TipoRegistroConsulta" }
        codigo: { type: string }
        codigoOrigen: { type: string }
        nombre: { type: string }
        estado: { type: string }
        fechaInicio: { type: string, format: date }
        unidadEjecutoraId: { type: integer, format: int64 }
        unidadEjecutoraDescripcion: { type: string }
        unidadEjecutoraAbreviatura: { type: string }
        responsableId: { type: integer, format: int64, nullable: true }
        puedeVerResponsable: { type: boolean }
        version: { type: integer, format: int64 }
        etag: { type: string }

    InstitutionalPortfolioDetail:
      type: object
      required: [id, tipoRegistro, codigo, fechaInicio, etag, version]
      description: >-
        Detalle institucional de un registro del portafolio. DTO propio
        del módulo consulta: no expone entidades JPA, BLOB, clave
        física ni URL directa. La colección de documentos solo
        contiene metadatos; el contenido se obtiene por
        /api/v1/documentos/{id}/contenido.
      properties:
        id: { type: integer, format: int64 }
        tipoRegistro: { $ref: "#/components/schemas/TipoRegistroConsulta" }
        codigo: { type: string }
        codigoOrigen: { type: string }
        fechaInicio: { type: string, format: date }
        fechaCierre: { type: string, format: date }
        nombre: { type: string }
        tipoSolucion: { $ref: "#/components/schemas/TipoSolucionConsulta" }
        fuenteOrigen: { $ref: "#/components/schemas/FuenteOrigenConsulta" }
        detalleFuente: { type: string }
        responsableId: { type: integer, format: int64 }
        problemaPublico: { type: string }
        solucionPropuesta: { type: string }
        objetivoPeiId: { type: integer, format: int64 }
        actividadPoiId: { type: integer, format: int64 }
        unidadEjecutoraId: { type: integer, format: int64 }
        unidadEjecutoraDescripcion: { type: string }
        unidadEjecutoraAbreviatura: { type: string }
        estado: { $ref: "#/components/schemas/EstadoIniciativaConsulta" }
        componenteDigital: { type: boolean }
        detalleComponenteDigital: { type: string }
        nota: { type: string }
        resultadosClave: { type: string }
        unidades:
          type: array
          items: { $ref: "#/components/schemas/InstitutionalPortfolioUnidad" }
        participantes:
          type: array
          description: Solo se incluye cuando el actor es Responsable, Evaluador o administrador autorizado.
          items: { $ref: "#/components/schemas/InstitutionalPortfolioPersonaParticipante" }
        documentos:
          type: array
          items: { $ref: "#/components/schemas/InstitutionalPortfolioDocument" }
        historial:
          type: array
          items: { $ref: "#/components/schemas/InstitutionalPortfolioHistoryEntry" }
        relacion: { $ref: "#/components/schemas/IniciativaProyectoRelacion" }
        actorEsResponsable: { type: boolean }
        actorEsEvaluador: { type: boolean }
        actorEsAdministrador: { type: boolean }
        fechaCreacion: { type: string, format: date-time }
        version: { type: integer, format: int64 }
        etag: { type: string }

    InstitutionalPortfolioPage:
      type: object
      required: [items, pagina, tamanio, totalElementos, totalPaginas, etag]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/InstitutionalPortfolioSummary" }
        pagina: { type: integer, minimum: 0 }
        tamanio: { type: integer, minimum: 1, maximum: 100 }
        totalElementos: { type: integer, minimum: 0 }
        totalPaginas: { type: integer, minimum: 0 }
        etag: { type: string }

    ClasificacionDocumentoClasificacion:
      type: string
      enum: [PUBLICO, INTERNO, RESTRINGIDO]

    ResultadoClasificacionEnum:
      type: string
      enum: [APLICADA, RECHAZADA, REVERTIDA]

    ValidarClasificacionRequest:
      type: object
      required: [clasificacion]
      properties:
        clasificacion: { $ref: "#/components/schemas/ClasificacionDocumentoClasificacion" }

    ValidacionClasificacionResult:
      type: object
      required: [documentoId, clasificacionValidada, etag]
      properties:
        documentoId: { type: integer, format: int64 }
        clasificacionAnterior: { $ref: "#/components/schemas/ClasificacionDocumentoClasificacion" }
        clasificacionValidada: { $ref: "#/components/schemas/ClasificacionDocumentoClasificacion" }
        fechaValidacion: { type: string, format: date-time }
        evaluadorId: { type: integer, format: int64 }
        etag: { type: string }

    ReclasificarDocumentoRequest:
      type: object
      required: [clasificacionNueva, documentoDecisionId, autoridadDecisoraId]
      properties:
        clasificacionNueva: { $ref: "#/components/schemas/ClasificacionDocumentoClasificacion" }
        documentoDecisionId: { type: integer, format: int64 }
        autoridadDecisoraId: { type: integer, format: int64 }
        motivo: { type: string, maxLength: 2000 }

    ReclasificacionDocumentoResult:
      type: object
      required: [documentoId, clasificacionAnterior, clasificacionNueva, etag, historial]
      properties:
        documentoId: { type: integer, format: int64 }
        clasificacionAnterior: { $ref: "#/components/schemas/ClasificacionDocumentoClasificacion" }
        clasificacionNueva: { $ref: "#/components/schemas/ClasificacionDocumentoClasificacion" }
        etag: { type: string }
        historial: { $ref: "#/components/schemas/ClasificacionHistDetalle" }

    ClasificacionHistDetalle:
      type: object
      required: [historialId, documentoId, clasificacionNueva, resultado]
      properties:
        historialId: { type: integer, format: int64 }
        documentoId: { type: integer, format: int64 }
        clasificacionAnterior: { $ref: "#/components/schemas/ClasificacionDocumentoClasificacion" }
        clasificacionNueva: { $ref: "#/components/schemas/ClasificacionDocumentoClasificacion" }
        autoridadDecisoraId: { type: integer, format: int64 }
        evaluadorRegistradorId: { type: integer, format: int64 }
        documentoDecisionId: { type: integer, format: int64 }
        motivo: { type: string, maxLength: 2000 }
        fechaCambio: { type: string, format: date-time }
        resultado: { $ref: "#/components/schemas/ResultadoClasificacionEnum" }

    PublicarDocumentoRequest:
      type: object
      required: [documentoId, tituloPublico, autoridadPublica]
      properties:
        documentoId: { type: integer, format: int64 }
        tituloPublico: { type: string, minLength: 5, maxLength: 500 }
        autoridadPublica: { type: string, maxLength: 100 }
        resumenPublico: { type: string, maxLength: 500 }

    PublicacionDocumentoDetail:
      type: object
      required: [publicacionId, documentoId, tituloPublico, fechaPublicacion]
      properties:
        publicacionId: { type: integer, format: int64 }
        documentoId: { type: integer, format: int64 }
        tituloPublico: { type: string }
        clasificacion: { $ref: "#/components/schemas/ClasificacionDocumentoClasificacion" }
        evaluadorConfirmadorId: { type: integer, format: int64 }
        asignacionEfectivaId: { type: integer, format: int64 }
        fechaPublicacion: { type: string, format: date-time }

    PublicPortfolioDocumento:
      type: object
      description: Metadatos públicos de un documento elegible. Nunca incluye BLOB ni URL.
      properties:
        tipoDocumental: { type: string }
        tituloPublico: { type: string }
        version: { type: integer }
        formato: { type: string }
        fechaPublicacion: { type: string, format: date-time }

    PublicPortfolioSummary:
      type: object
      description: Resumen público con los cuatro campos públicos aprobados.
      required: [id, tipoRegistro, codigo, nombre, estado, etag]
      properties:
        id: { type: integer, format: int64 }
        tipoRegistro: { type: string, enum: [INICIATIVA, PROYECTO] }
        codigo: { type: string }
        nombre: { type: string }
        estado: { type: string }
        fechaInicio: { type: string, format: date }
        publicaciones:
          type: array
          items: { $ref: "#/components/schemas/PublicPortfolioDocumento" }
        etag: { type: string }

    PublicPortfolioDetail:
      type: object
      required: [id, tipoRegistro, codigo, nombre, estado, etag]
      properties:
        id: { type: integer, format: int64 }
        tipoRegistro: { type: string, enum: [INICIATIVA, PROYECTO] }
        codigo: { type: string }
        nombre: { type: string }
        estado: { type: string }
        publicaciones:
          type: array
          items: { $ref: "#/components/schemas/PublicPortfolioDocumento" }
        etag: { type: string }

    PublicPortfolioPage:
      type: object
      required: [items, pagina, tamanio, totalElementos, totalPaginas, etag]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/PublicPortfolioSummary" }
        pagina: { type: integer, minimum: 0 }
        tamanio: { type: integer, minimum: 1, maximum: 100 }
        totalElementos: { type: integer, minimum: 0 }
        totalPaginas: { type: integer, minimum: 0 }
        etag: { type: string }

    SemestralReportRequest:
      type: object
      description: Solicitud de generacion del reporte semestral oficial.
      required: [anio, semestre]
      properties:
        anio: { type: integer, minimum: 2000, maximum: 2100 }
        semestre: { type: integer, enum: [1, 2] }

    ExtraordinarioReportRequest:
      type: object
      description: Solicitud de generacion del reporte extraordinario (BR-120).
      required: [solicitudDocumentoId, aprobacionOficinaDocumentoId, periodo, fechaCorte, filtros]
      properties:
        solicitudDocumentoId: { type: integer, format: int64 }
        aprobacionOficinaDocumentoId: { type: integer, format: int64 }
        periodo: { type: string, maxLength: 30 }
        fechaCorte: { type: string, format: date }
        filtros: { $ref: "#/components/schemas/ReportFiltros" }

    ReportFiltros:
      type: object
      description: Filtros BR-123 aplicados al reporte.
      properties:
        tipo: { type: string, maxLength: 30 }
        estado: { type: string, maxLength: 30 }
        unidadId: { type: integer, format: int64 }
        responsableId: { type: integer, format: int64 }
        fuente: { type: string, maxLength: 30 }
        tipoSolucion: { type: string, maxLength: 30 }
        producto: { type: string, maxLength: 40 }
        unidadesAdicionales:
          type: array
          items: { type: string }

    ReportOperation:
      type: object
      description: Resultado 202 de una generacion de reporte.
      required: [reporteId, operacionId, corte, versionDatos, estadoTecnico]
      properties:
        reporteId: { type: integer, format: int64 }
        operacionId: { type: string }
        corte: { type: string, format: date }
        versionDatos: { type: integer }
        estadoTecnico: { type: string, enum: [INICIADA, GENERADA, APROBADA, FALLIDA] }
        clasificacion: { type: string, enum: [INTERNO, RESTRINGIDO] }
        hashSnapshot: { type: string, description: Hash SHA-256 del snapshot CLOB JSON. }
        fechaGeneracion: { type: string, format: date-time }

    IndicadorReporte:
      type: object
      description: Indicador BR-122 con numerador, denominador, porcentaje y
        aplicabilidad. Cuando el denominador es cero, el indicador es
        "no aplicable" y porcentaje es nulo.
      required: [nombre, numerador, denominador, aplicable]
      properties:
        nombre: { type: string }
        numerador: { type: integer, format: int64, minimum: 0 }
        denominador: { type: integer, format: int64, minimum: 0 }
        porcentaje:
          type: number
          format: double
          nullable: true
        aplicable: { type: boolean }
        detalle: { type: string }

    TotalDimension:
      type: object
      description: Totales BR-121 agrupados por una dimension canonica.
      required: [dimension]
      properties:
        dimension: { type: string }
        items:
          type: array
          items: { $ref: "#/components/schemas/TotalDimensionItem" }

    TotalDimensionItem:
      type: object
      required: [clave, etiqueta, total]
      properties:
        clave: { type: string }
        etiqueta: { type: string }
        total: { type: integer, format: int64, minimum: 0 }

    ReporteArchivoSummary:
      type: object
      description: Resumen de un archivo PDF o XLSX emitido. El contenido se
        descarga por GET /reportes/generaciones/{id}/archivos/{PDF|XLSX}.
      required: [idArchivo, formato, version, hashSha256]
      properties:
        idArchivo: { type: integer, format: int64 }
        formato: { type: string, enum: [PDF, XLSX] }
        version: { type: integer }
        hashSha256: { type: string, description: Hash SHA-256 del archivo. }
        idDocumentoVersion: { type: integer, format: int64 }
        creadoPor: { type: string }
        fechaCreacion: { type: string, format: date-time }

    ReporteDetail:
      type: object
      description: Detalle del reporte institucional, snapshot, indicadores,
        totales y archivos.
      required: [idReporte, tipo, periodo, fechaCorte, estadoTecnico,
        versionDatos, clasificacion, etag]
      properties:
        idReporte: { type: integer, format: int64 }
        tipo: { type: string, enum: [SEMESTRAL, EXTRAORDINARIO] }
        anio: { type: integer }
        semestre:
          type: integer
          nullable: true
        periodo: { type: string }
        fechaCorte: { type: string, format: date }
        versionDatos: { type: integer }
        estadoTecnico: { type: string, enum: [INICIADA, GENERADA, APROBADA, FALLIDA] }
        clasificacion: { type: string, enum: [INTERNO, RESTRINGIDO] }
        hashSnapshot: { type: string }
        idSnapshot: { type: integer, format: int64 }
        idGenerador: { type: integer, format: int64 }
        fechaGeneracion: { type: string, format: date-time }
        filtros: { $ref: "#/components/schemas/ReportFiltros" }
        indicadores:
          type: array
          items: { $ref: "#/components/schemas/IndicadorReporte" }
        totales:
          type: array
          items: { $ref: "#/components/schemas/TotalDimension" }
        archivos:
          type: array
          items: { $ref: "#/components/schemas/ReporteArchivoSummary" }
        etag: { type: string }

    ReporteAprobacionRequest:
      type: object
      description: Aprobacion formal (BR-127) de la version exacta.
      required: [idVersion, idDocumentoAprobacion, destinatarios]
      properties:
        idVersion: { type: integer, minimum: 1 }
        idDocumentoAprobacion: { type: integer, format: int64 }
        destinatarios:
          type: array
          minItems: 1
          maxItems: 50
          items: { $ref: "#/components/schemas/DestinatarioReporteRequest" }

    DestinatarioReporteRequest:
      type: object
      description: Destinatario propuesto por la Oficina de Modernizacion.
      required: [tipoDestinatario, idEntidad, nombre]
      properties:
        tipoDestinatario:
          type: string
          enum: [AUTORIDAD_MIDAGRI, OFICINA_MODERNIZACION, PCM_SGP]
        idEntidad: { type: integer, format: int64 }
        nombre: { type: string, maxLength: 200 }

    DestinatarioReporteDetail:
      type: object
      required: [idDestinatario, idAprobacion, tipoDestinatario, idEntidad, nombre]
      properties:
        idDestinatario: { type: integer, format: int64 }
        idAprobacion: { type: integer, format: int64 }
        tipoDestinatario: { type: string, enum: [AUTORIDAD_MIDAGRI, OFICINA_MODERNIZACION, PCM_SGP] }
        idEntidad: { type: integer, format: int64 }
        nombre: { type: string }

    ReporteAprobacionDetail:
      type: object
      required: [idAprobacion, idReporte, idVersion, idOficina, idAprobador,
        idDocumentoAprobacion, fechaAprobacion, destinatarios]
      properties:
        idAprobacion: { type: integer, format: int64 }
        idReporte: { type: integer, format: int64 }
        idVersion: { type: integer }
        idOficina: { type: integer, format: int64 }
        idAprobador: { type: integer, format: int64 }
        idDocumentoAprobacion: { type: integer, format: int64 }
        fechaAprobacion: { type: string, format: date-time }
        destinatarios:
          type: array
          items: { $ref: "#/components/schemas/DestinatarioReporteDetail" }

    ReporteRemisionRequest:
      type: object
      description: Remision manual recuperable (BR-128).
      required: [idVersion, destinatariosIds, resultado]
      properties:
        idVersion: { type: integer, minimum: 1 }
        destinatariosIds:
          type: array
          minItems: 1
          maxItems: 50
          items: { type: integer, format: int64 }
        resultado: { type: string, enum: [EXITOSA, FALLIDA, PENDIENTE] }
        motivo: { type: string, maxLength: 2000 }

    ReporteRemisionDetail:
      type: object
      required: [idRemision, idReporte, idDestinatario, resultado, fechaRemision]
      properties:
        idRemision: { type: integer, format: int64 }
        idReporte: { type: integer, format: int64 }
        idDestinatario: { type: integer, format: int64 }
        resultado: { type: string, enum: [EXITOSA, FALLIDA, PENDIENTE] }
        motivo: { type: string }
        fechaRemision: { type: string, format: date-time }

    ReporteRemisionPage:
      type: object
      required: [idReporte, remisiones]
      properties:
        idReporte: { type: integer, format: int64 }
        idVersion:
          type: integer
          nullable: true
        remisiones:
          type: array
          items: { $ref: "#/components/schemas/ReporteRemisionDetail" }

    # =====================================================================
    # D-02 - Schemas de organización institucional.
    # =====================================================================

    UnidadOrganizacional:
      type: object
      required: [id, codigo, descripcion, abreviatura, nivel, activa]
      properties:
        id: { type: integer, format: int64 }
        codigo: { type: string }
        descripcion: { type: string }
        abreviatura: { type: string }
        nivel: { type: integer }
        unidadPadreId: { type: integer, format: int64, nullable: true }
        activa: { type: boolean }

    ObjetivoPei:
      type: object
      required: [id, codigo, descripcion, anio, estado]
      properties:
        id: { type: integer, format: int64 }
        codigo: { type: string }
        descripcion: { type: string }
        anio: { type: integer }
        estado: { type: string, enum: [VIGENTE, VENCIDO] }

    ActividadPoi:
      type: object
      required: [id, codigo, descripcion, objetivoPeiId, estado]
      properties:
        id: { type: integer, format: int64 }
        codigo: { type: string }
        descripcion: { type: string }
        objetivoPeiId: { type: integer, format: int64 }
        estado: { type: string, enum: [VIGENTE, VENCIDO] }

    # =====================================================================
    # D-03 - Schemas de suplencias.
    # =====================================================================

    SuplenciaRequest:
      type: object
      required: [suplenteId, fechaInicio, fechaFin]
      properties:
        suplenteId:
          type: integer
          format: int64
          description: Usuario que asume temporalmente la asignación.
        fechaInicio:
          type: string
          format: date
          description: Fecha de inicio de la suplencia. Debe ser posterior a hoy.
        fechaFin:
          type: string
          format: date
          description: Fecha de fin de la suplencia. Debe ser posterior a fechaInicio.
        motivo:
          type: string
          maxLength: 500

    SuplenciaDetail:
      type: object
      required: [id, titularId, suplenteId, fechaInicio, fechaFin, estado, etag]
      properties:
        id: { type: integer, format: int64 }
        titularId: { type: integer, format: int64 }
        titularNombre: { type: string }
        suplenteId: { type: integer, format: int64 }
        suplenteNombre: { type: string }
        fechaInicio: { type: string, format: date }
        fechaFin: { type: string, format: date }
        terminadaEn: { type: string, format: date-time, nullable: true }
        estado: { type: string, enum: [ACTIVA, TERMINADA] }
        version: { type: integer, format: int64 }
        etag: { type: string }

security:
  - bearerAuth: []

