<section class="suspension" aria-labelledby="suspension-title"><button mat-stroked-button type="button" (click)="abrir()">Suspender proyecto</button>@if (open()) { <form [formGroup]="form" (ngSubmit)="submit()" novalidate><h2 id="suspension-title">Suspensión de proyecto</h2><label for="suspension-document">Documento de suspensión</label><input id="suspension-document" matInput type="number" formControlName="idDocumento" /><label for="suspension-observation">Observación de suspensión</label><textarea id="suspension-observation" matInput formControlName="observacion"></textarea>@if (problem(); as detail) { <p role="alert" aria-live="assertive">{{ detail.title }} {{ detail.code }} {{ detail.detail }}</p> }<button mat-flat-button type="submit" [disabled]="saving()">Confirmar suspensión</button><button mat-button type="button" (click)="cerrar()">Volver</button></form> }</section>
